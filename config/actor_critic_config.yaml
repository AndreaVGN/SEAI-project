environment:
  name: "LunarLander-v3"
  seed: 42
  normalize_obs: true

agent:
  actor_lr: 0.0003       # actor learning rate
  critic_lr: 0.0001      # critic learning rate (lowered from 0.001 to prevent divergence)
  gamma: 0.99            # discount factor
  entropy_coef: 0.001     # entropy regularization (raised from 0.01 to prevent premature collapse)
  n_steps: 200            # n-step returns for bootstrapping

network:
  hidden_layers: [256, 256]
  activation: "relu"
  dropout: 0.0

training:
  n_episodes: 5000
  max_steps: 1000
  seeds: [42, 123, 456, 789, 1234]
  save_every: 200
  log_every: 10

evaluation:
  n_eval_episodes: 20
  render: false
