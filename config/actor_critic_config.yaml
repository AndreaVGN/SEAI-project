environment:
  name: "LunarLander-v3"
  seed: 42
  normalize_obs: true

agent:
  actor_lr: 0.0003
  critic_lr: 0.0001        # più basso dell'actor: il critic deve essere stabile, non rincorrere target rumorosi
  lr_end: 0.00001          # lr floor per cosine annealing (actor e critic)
  gamma: 0.99
  entropy_coef: 0.003      # ottimizzato via grid search (0.001,0.003,0.005,0.01) — best su seed 42
  n_steps: 200             # near-Monte Carlo: bypassa le stime errate del critic nelle prime fasi
  num_envs: 8              # N ambienti paralleli: N×n_steps=1600 transizioni per update

network:
  hidden_layers: [256, 256]
  activation: "relu"
  dropout: 0.0

training:
  n_episodes: 5000         # aumentato da 3000: più margine nella fase finale post-convergenza
  max_steps: 1000
  seeds: [42, 123, 456, 789, 1234]
  save_every: 200
  log_every: 10

evaluation:
  n_eval_episodes: 100      # aumentato da 20: stime più robuste (meno varianza)
  render: false

# ---------------------------------------------------------------------------
# PARAMETRI PRECEDENTI (v1)
# ---------------------------------------------------------------------------
# agent:
#   actor_lr: 0.0003
#   critic_lr: 0.0001      # lowered from 0.001 to prevent divergence
#   gamma: 0.99
#   entropy_coef: 0.001    # raised from 0.01 to prevent premature collapse
#   n_steps: 200           # n-step returns for bootstrapping (near Monte Carlo)
#
# training:
#   n_episodes: 5000
#
# evaluation:
#   n_eval_episodes: 20

# ---------------------------------------------------------------------------
# ABLATION STUDIES
# ---------------------------------------------------------------------------
# n_steps e num_envs sono già qui sopra — modificarli direttamente o
# sovrascriverli via CLI (--n_steps, --num_envs) per le ablation.

reward_coefficients:
  enabled: false
  pos_coef: 100.0
  vel_coef: 100.0
  angle_coef: 100.0
  leg_reward: 10.0
  main_engine_coef: 0.30
  side_engine_coef: 0.03
  crash_penalty: 100.0
  land_bonus: 100.0
